[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "migrations",
    "staticfiles",
]

[tool.ruff.lint]
select = [
    "E",   # Errores de estilo
    "F",   # Errores de Pyflakes
    "I",   # Orden de importaciones
    "B",   # Posibles errores comunes
    "UP",  # Modernización de sintaxis de Python
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true


[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
pythonpath = ["src"]

python_files = [
    "test_*.py",
    "*_test.py",
]

testpaths = [
    "tests",
    "src/apps",
]

addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]